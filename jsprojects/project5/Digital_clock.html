<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            color: aliceblue;
        }
        div{
            height: 100vh;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        button{
            background-color: darkorange;
           padding-left: 20px;
           padding-right: 20px;
            height: 10%;
            border-radius: 0.5rem;
            border: none;
            margin-top: 2%;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    
    <div>
        <h1>Your Local Time</h1>
        <button class="clock"></button>
    </div>
    <script src="Digital_clock.js"></script>
</body>
</html>
